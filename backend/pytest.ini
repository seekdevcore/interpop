[pytest]
DJANGO_SETTINGS_MODULE = config.settings.development
python_files = test_*.py
python_classes = Test
python_functions = test_*
addopts =
    --strict-markers
    --strict-config
    --reuse-db
    --tb=short
    -ra
testpaths = apps
filterwarnings =
    ignore::DeprecationWarning:django.*
    ignore::PendingDeprecationWarning:django.*
markers =
    slow: marca teste lento (rodar com -m slow)
    integration: requer DB+Redis reais
    unit: puramente em memória (rápido)
    requires_postgres: requer Postgres real (FTS pt-BR, extensions, GIN); pula em SQLite-dev (ADR-020)
